name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    name: Build Windows binary
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build Windows executable
        run: npm run build

      - name: Create distribution ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path dist/chatgpt-exporter-win.exe,dist/public -DestinationPath dist/chatgpt-exporter-win.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chatgpt-exporter-win
          path: |
            dist/chatgpt-exporter-win.exe
            dist/chatgpt-exporter-win.zip

  release:
    name: Create GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: chatgpt-exporter-win
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/chatgpt-exporter-win.exe
            dist/chatgpt-exporter-win.zip
          generate_release_notes: true
          body: |
            ## Installation

            ### Windows (no Node.js required)
            Download `chatgpt-exporter-win.zip`, extract it, and double-click `chatgpt-exporter-win.exe`.
            The zip contains the exe **and** the required `public/` folder.
            > Windows SmartScreen may show a warning — click "More info" → "Run anyway".

            ### macOS / Linux (requires Node.js 18+)
            ```bash
            npx chatgpt-exporter
            ```

            ### Manual install (any OS)
            ```bash
            git clone https://github.com/ezwep/chatgpt-exporter.git
            cd chatgpt-exporter
            node server.js
            ```
